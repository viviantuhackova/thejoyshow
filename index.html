<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervace: The Joy SHOW 2026</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 25px; }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .header { grid-column: 1 / -1; text-align: center; margin-bottom: 0; }
        h1 { margin: 0 0 5px 0; color: #0f172a; font-size: 24px; }
        .subtitle { margin: 0; color: #64748b; font-size: 15px; }
        .date-badge { display: inline-block; background: #f43f5e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 13px; margin-top: 8px; font-weight: 600; }
        
        .stage { background: #334155; color: white; text-align: center; padding: 12px; font-weight: 700; letter-spacing: 4px; border-radius: 6px; margin: 15px auto 35px auto; width: 80%; font-size: 14px; }
        .seating-chart { display: flex; flex-direction: column; align-items: center; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .row { display: flex; align-items: center; gap: 6px; flex-direction: row-reverse; justify-content: flex-end; }
        .row-label { font-weight: 600; width: 65px; font-size: 13px; color: #64748b; }
        .seat { width: 30px; height: 30px; background-color: #22c55e; color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; cursor: pointer; user-select: none; transition: all 0.15s ease; }
        .seat.selected { background-color: #eab308 !important; color: #1e293b; }
        .seat.pending { background-color: #f97316 !important; cursor: not-allowed; }
        .seat.occupied { background-color: #cbd5e1 !important; color: #94a3b8; cursor: not-allowed; }
        .seat.cameraman { background-color: #94a3b8 !important; color: #475569 !important; cursor: not-allowed; font-size: 14px; }
        
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 25px; font-size: 13px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 4px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .summary-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .price-total { font-size: 20px; font-weight: 700; color: #2563eb; }
        .btn-submit { background: #2563eb; color: white; border: none; width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border-radius: 6px; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
        
        #sekce-sezeni { display: block; }

        /* ABSOLUTNÍ FIXNÍ VYCENTROVÁNÍ PRO MOBILY I PC */
        .stop-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: rgba(15, 23, 42, 0.85); 
            z-index: 99999; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
            text-align: center; 
        }
        .stop-title { 
            color: #ef4444; 
            font-size: 46px; 
            font-weight: 900; 
            letter-spacing: 2px; 
            margin: 0 0 12px 0; 
            font-family: sans-serif; 
            text-shadow: 0 4px 12px rgba(0,0,0,0.6); 
        }
        .stop-text { 
            color: #ffffff; 
            font-size: 24px; 
            font-weight: bold; 
            margin: 0; 
            font-family: sans-serif; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.6); 
        }
        
        @media (max-width: 600px) {
            .stop-title { font-size: 34px; letter-spacing: 1px; }
            .stop-text { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="stop-overlay">
    <h1 class="stop-title">PRODEJ SKONČIL</h1>
    <p class="stop-text">Těšíme se na Vás na show! 🎉</p>
</div>

<div style="opacity: 0.40; pointer-events: none; user-select: none; max-width: 1100px; margin: 0 auto;">
    <div class="container">
        <div class="card header">
            <h1>Rezervace lístků</h1>
            <p class="subtitle">Závěrečná taneční show The Joy | Koncertní sál ZUŠ Litvínov</p>
            <div class="date-badge">📅 Sobota 20. 6. 2026</div>
        </div>

        <div class="card">
            <div id="loading-state" style="text-align:center; padding: 30px; color:#64748b; font-weight: 500;">
                Načítám plánek sálu...
            </div>

            <div id="sekce-sezeni">
                <div class="stage">PÓDIUM</div>
                <div class="seating-chart" id="sal"></div>
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot" style="background: #22c55e;"></div> Volno</div>
                    <div class="legend-item"><div class="legend-dot" style="background: #cbd5e1;"></div> Zaplaceno / Obsazeno</div>
                </div>
            </div>
        </div>

        <div class="card">
            <form id="reservation-form">
                <h3>Vaše objednávka</h3>
                <div class="form-group">
                    <label for="name">Jméno a příjmení:</label>
                    <input type="text" id="name" disabled placeholder="Jan Novák">
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" disabled placeholder="jan.novak@email.cz">
                </div>
                <button type="submit" class="btn-submit" id="submit-btn" disabled>Závazně rezervovat</button>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAoXjgvQ7JRrO9D9b9RXmDRIP_Ci2Kny-w",
        authDomain: "joyshow-abf1b.firebaseapp.com",
        projectId: "joyshow-abf1b",
        storageBucket: "joyshow-abf1b.firebasestorage.app",
        messagingSenderId: "15709074926",
        appId: "1:15709074926:web:7171d5c28686be321d0aff",
        measurementId: "G-6CWSBH4QY4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const configRad = [10, 11, 13, 15, 17, 18, 20, 7]; 
    const salDiv = document.getElementById('sal');
    const loadingDiv = document.getElementById('loading-state');

    configRad.forEach((pocetZidli, indexRady) => {
        const cisloRady = indexRady + 1;
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';

        const label = document.createElement('div');
        label.className = 'row-label';
        label.innerText = `${cisloRady}. řada`;
        rowDiv.appendChild(label);

        for (let i = 1; i <= pocetZidli; i++) {
            const seatId = `${cisloRady}-${i}`;
            const seat = document.createElement('div');
            seat.className = 'seat';
            seat.innerText = i;
            seat.id = `seat-${seatId}`;
            
            if (cisloRady === 1) {
                seat.className = 'seat occupied';
            } else if (cisloRady === 8 && i === 4) {
                seat.className = 'seat cameraman';
                seat.innerText = '✕';
            }
            rowDiv.appendChild(seat);
        }
        salDiv.appendChild(rowDiv);
    });

    onSnapshot(collection(db, "sedadla"), (snapshot) => {
        document.querySelectorAll('.seat').forEach(s => {
            if (!s.classList.contains('cameraman') && !s.id.includes('seat-1-')) {
                s.classList.remove('occupied', 'pending');
            }
        });

        snapshot.forEach((doc) => {
            if (!doc.id.startsWith("stani-") && doc.id !== "konfigurace") {
                const data = doc.data();
                const seatElement = document.getElementById(`seat-${doc.id}`);
                if (seatElement && !seatElement.classList.contains('cameraman')) {
                    if (data.status === "zaplaceno") seatElement.classList.add('occupied');
                    if (data.status === "ceka_na_platbu") seatElement.classList.add('pending');
                }
            }
        });
        loadingDiv.style.display = 'none';
    });
</script>
</body>
</html>
